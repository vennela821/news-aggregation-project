spring.application.name=news-aggregator-backend
server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/newsdb}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=change-this-secret-for-production
app.jwt.expiration-ms=86400000
