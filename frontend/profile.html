<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | News Aggregator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="profile">
    <header class="topbar">
        <div>
            <p class="eyebrow">Student News Desk</p>
            <h1>Your Profile</h1>
            <p>Account details, access level, and your published stories.</p>
        </div>
        <nav class="page-nav" aria-label="Primary navigation">
            <a href="dashboard.html">Home</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="admin.html" class="admin-link hidden">Admin</a>
            <button id="logoutBtn" class="secondary" type="button">Logout</button>
            <button id="themeBtn" class="secondary" type="button">🌙</button>
        </nav>
    </header>

    <main class="profile-layout">
        <section class="profile-card">
            <p class="eyebrow dark">Account</p>
            <div class="avatar-box">
   <img src="https://i.pravatar.cc/200" alt="profile">
</div>
            <h2>Profile Information</h2>
            <dl class="profile-list">
                <div><dt>Name</dt><dd id="profileName">-</dd></div>
                <div><dt>Email</dt><dd id="profileEmail">-</dd></div>
                <div><dt>Role</dt><dd id="profileRole">READER</dd></div>
            </dl>
        </section>

        <section class="history-card">
            <div class="section-heading">
                <div>
                    <p class="eyebrow dark">Publishing history</p>
                    <h2>Your Articles</h2>
                </div>
            </div>
            <div id="myArticles" class="compact-list" aria-live="polite"></div>
        </section>
    </main>

    <script src="app.js?v=20260610-review"></script>
</body>
</html>
